packages:
  - "apps/*"
  - "packages/*"
  - "services/*"

# Supply-chain posture (SSOT §Step 0.1 / R15): dependency lifecycle scripts do
# NOT run unless the package is named here. Only native modules that genuinely
# must build/download binaries are allowed. pnpm matches these by BARE NAME
# across the whole graph — re-audit this list whenever the lockfile changes,
# and re-review each entry's install script when the package actually lands.
onlyBuiltDependencies:
  - electron
  - esbuild
  - better-sqlite3

# Pin the native SQLite binding to a single version so exactly ONE artifact
# exists in the store. Its ABI is toggled between Node (vitest/CI) and Electron
# (the app) via the desktop rebuild:node / rebuild:electron scripts — a rebuild,
# never a reinstall (SSOT Step 0.6). Committed state is Node ABI.
overrides:
  better-sqlite3: 12.11.1
